<img [src]="photoUrl()" />
<div class="content">
  <strong [class.hidden]="!isShow()" [class.text-danger]="specialPrice()">{{ productName() }}</strong>
</div>
<div>
  @for (author of authors(); track $index) {
  <span>{{ author }}</span>
  @if (!$last) {
  <span>、</span>
  } }
</div>
<div class="company">
  <span>{{ company() }}</span>
  @if (specialPrice()) {
  <span>{{ specialPrice() | currency : '$' : 'symbol' : '4.2' }}</span>
  } @else {
  <span>{{ price() | currency : '$' : 'symbol' : '4.2' }}</span>
  }
</div>
<div class="button">
  <button type="button" (click)="view.emit()">明細</button>
  <button type="button" class="add-cart" (click)="onCardAddToCart()">加入購物車</button>
</div>
